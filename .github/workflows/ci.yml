name: SecureDoc CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend pytest
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SECUREDOC_DATABASE_URL: sqlite:///:memory:
      SECUREDOC_ENV: development
      SECUREDOC_DEMO_OTP_IN_RESPONSE: "false"
      SECUREDOC_SMTP_HOST: ""
      SECUREDOC_JWT_SECRET: ci-only-random-looking-jwt-secret-change-before-prod
      SECUREDOC_OTP_PEPPER: ci-only-random-looking-otp-pepper-change-before-prod
      SECUREDOC_TOTP_ENCRYPTION_KEY: ci-only-random-looking-totp-key-change-before-prod
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run backend tests
        run: python -m pytest tests

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
